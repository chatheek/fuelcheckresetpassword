<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel-Check | Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #FFF4CE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #FFB800; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #message { margin-top: 1rem; font-size: 0.85rem; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>

    <script>
        // Use a "Global Check" to prevent the "Already Declared" error
        let supabaseClient;
        
        window.onload = () => {
            const SUPABASE_URL = 'https://vdonioovmmuvfpbcbzer.supabase.co';
            const SUPABASE_ANON_KEY = 'YOUR_KEY_HERE';
            
            // Initialize only once
            if (!supabaseClient) {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        };

        async function handleReset() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const btn = document.getElementById('reset-btn');
            const msgDiv = document.getElementById('message');

            if (password !== confirm) return showMessage("Passwords do not match!", "error");
            if (password.length < 6) return showMessage("Password too short!", "error");

            btn.disabled = true;
            btn.innerText = "Updating...";

            try {
                // updateUser works automatically because the token is in the URL hash (#)
                const { error } = await supabaseClient.auth.updateUser({ password: password });
                if (error) throw error;

                showMessage("Success! You can now log in to the app.", "success");
                btn.style.display = "none";
            } catch (err) {
                showMessage(err.message, "error");
                btn.disabled = false;
                btn.innerText = "Update Password";
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = text;
            msgDiv.className = type;
            msgDiv.style.display = "block";
        }
    </script>
</head>
<body>

<div class="card">
    <h2>Update Password</h2>
    <p>Enter your new password for Fuel-Check</p>
    
    <input type="password" id="new-password" placeholder="New Password">
    <input type="password" id="confirm-password" placeholder="Confirm Password">
    
    <button id="reset-btn" onclick="handleReset()">Update Password</button>
    
    <div id="message"></div>
</div>

</body>
</html>
