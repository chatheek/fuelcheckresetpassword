<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel-Check | Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FFF4CE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #FFB800; border: none; border-radius: 8px; color: black; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #e6a600; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #message { margin-top: 1rem; font-size: 0.85rem; display: none; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="card">
    <h2>Secure Reset</h2>
    <p>Please enter your new password below to regain access to your account.</p>
    
    <input type="password" id="new-password" placeholder="New Password" minlength="6">
    <input type="password" id="confirm-password" placeholder="Confirm New Password">
    
    <button id="reset-btn" onclick="handleReset()">Update Password</button>
    
    <div id="message"></div>
</div>

<script>
    // 1. Initialize Supabase
    const SUPABASE_URL = 'https://vdonioovmmuvfpbcbzer.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkb25pb292bW11dmZwYmNiemVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDg3NTYsImV4cCI6MjA4ODY4NDc1Nn0.UP3kTbPR1D3Y7mPUw6hwDC8BOEf5KByIuY61dCIgEPw';
    const supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleReset() {
        const password = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        const btn = document.getElementById('reset-btn');
        const msgDiv = document.getElementById('message');

        // Basic Validation
        if (password !== confirm) {
            showMessage("Passwords do not match!", "error");
            return;
        }
        if (password.length < 6) {
            showMessage("Password must be at least 6 characters.", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Updating...";

        try {
            // Supabase automatically pulls the token from the URL hash (#access_token=...)
            const { error } = await supabase.auth.updateUser({ password: password });

            if (error) throw error;

            showMessage("Password updated! You can now return to the Fuel-Check app and login.", "success");
            btn.style.display = "none";
            document.querySelectorAll('input').forEach(i => i.style.display = 'none');
            
        } catch (err) {
            showMessage(err.message, "error");
            btn.disabled = false;
            btn.innerText = "Update Password";
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.className = type;
        msgDiv.style.display = "block";
    }
</script>

</body>
</html>
