<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel-Check | Reset Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #FFF4CE; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #FFB800; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #message { margin-top: 1rem; padding: 10px; border-radius: 5px; display: none; font-size: 14px; }
        .error { background-color: #f8d7da; color: #721c24; }
        .success { background-color: #d4edda; color: #155724; }
        #loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading">Verifying security token...</div>
    
    <div id="reset-form" style="display: none;">
        <h2>Update Password</h2>
        <p style="font-size: 13px; color: #666;">Enter a new password for your account.</p>
        <input type="password" id="new-password" placeholder="New Password">
        <input type="password" id="confirm-password" placeholder="Confirm Password">
        <button id="submit-btn" onclick="handleUpdate()">Save Password</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://vdonioovmmuvfpbcbzer.supabase.co';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // This is the "Gatekeeper"
    supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' || session) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('reset-form').style.display = 'block';
        } else {
            // Give it 2 seconds to recover session before showing error
            setTimeout(() => {
                if (!document.getElementById('reset-form').offsetParent) {
                    document.getElementById('loading').innerHTML = "❌ Session Expired or Link Invalid.";
                    showMessage("Please request a new link from the mobile app.", "error");
                }
            }, 2000);
        }
    });

    async function handleUpdate() {
        const pass = document.getElementById('new-password').value;
        const conf = document.getElementById('confirm-password').value;
        const btn = document.getElementById('submit-btn');

        if (pass !== conf) return showMessage("Passwords do not match!", "error");
        if (pass.length < 6) return showMessage("Password must be 6+ chars.", "error");

        btn.disabled = true;
        btn.innerText = "Updating...";

        const { error } = await supabaseClient.auth.updateUser({ password: pass });

        if (error) {
            showMessage(error.message, "error");
            btn.disabled = false;
            btn.innerText = "Save Password";
        } else {
            showMessage("✅ Success! You can now log in to the Fuel-Check app.", "success");
            document.getElementById('reset-form').style.display = 'none';
        }
    }

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.innerText = text;
        msg.className = type;
        msg.style.display = "block";
    }
</script>
</body>
</html>
